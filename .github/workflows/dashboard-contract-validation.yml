name: Dashboard Contract Validation

# Fast HTTP-level check that the deployed XION dashboard is reachable and
# serving the expected SPA shell.
#
# The validation logic is shared between the testnet (blocking) and mainnet
# (informational) jobs via .github/scripts/validate-dashboard-shell.sh.
# Mainnet runs in non-blocking mode: the job stays green even when issues
# are detected; warnings are surfaced via PR comment so the run doesn't
# look broken to engineers scanning the checks list.
#
# Browser-driven mode-mount + SDK ↔ dashboard message handshake validation
# lives in the integration test suite — see
# packages/abstraxion-js/tests/integration/message-contract.integration.test.ts
# (run via integration-tests.yml).

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/abstraxion-js/**"
      - "packages/abstraxion-core/**"
      - "packages/constants/**"
      - ".github/workflows/dashboard-contract-validation.yml"
      - ".github/scripts/validate-dashboard-shell.sh"
  push:
    branches: [main, develop]
    paths:
      - "packages/abstraxion-js/**"
      - "packages/abstraxion-core/**"
      - "packages/constants/**"
      - ".github/scripts/validate-dashboard-shell.sh"
  workflow_dispatch:

# Dashboard URLs come from packages/constants/src/index.ts (DASHBOARD_URLS).
# Keep these in sync.

jobs:
  http-shell-testnet:
    name: HTTP shell — testnet (auth.testnet)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate SPA shell loads
        env:
          BLOCKING: "true"
        run: bash .github/scripts/validate-dashboard-shell.sh https://auth.testnet.burnt.com

  # Non-blocking mainnet check. The script exits 0 even on failure here, so
  # the job appears green in the checks list — engineers don't see a red ❌
  # for an informational signal. Issues surface via the report-mainnet
  # follow-up job which posts a PR comment.
  http-shell-mainnet:
    name: HTTP shell — mainnet (settings.burnt.com) [informational]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      had_warnings: ${{ steps.validate.outputs.had_warnings }}
      warning_summary: ${{ steps.validate.outputs.warning_summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate SPA shell loads
        id: validate
        env:
          BLOCKING: "false"
        run: bash .github/scripts/validate-dashboard-shell.sh https://settings.burnt.com

  report-testnet-failure:
    name: Post PR comment on testnet failure
    needs: [http-shell-testnet]
    if: failure() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## ❌ Dashboard Contract Validation Failed (testnet)',
              '',
              'The deployed XION testnet dashboard failed HTTP-level validation.',
              '',
              '### What was checked',
              '- SPA HTML loads on the canonical testnet environment (auth.testnet.burnt.com)',
              '- The hashed Vite JS bundle(s) are reachable',
              '- Iframe-embed headers (`frame-ancestors`, `X-Frame-Options`) still permit embedding',
              '',
              '### Likely causes',
              '- Dashboard deployment is down or stuck on a stale build',
              '- A dashboard URL changed (update `packages/constants/src/index.ts`)',
              '- Iframe-embed headers regressed',
              '',
              '> Mainnet runs as an informational-only signal — see the separate comment if it also detected issues.',
              '> Browser-driven mode + SDK handshake checks run separately in the Integration Tests workflow.',
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  report-mainnet-warnings:
    name: Post PR comment on mainnet warnings
    needs: [http-shell-mainnet]
    if: needs.http-shell-mainnet.outputs.had_warnings == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          WARNING_SUMMARY: ${{ needs.http-shell-mainnet.outputs.warning_summary }}
        with:
          script: |
            const summary = process.env.WARNING_SUMMARY || '(no details captured)';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## ⚠️ Mainnet Dashboard Contract Warning [informational]',
              '',
              'The mainnet dashboard (`https://settings.burnt.com`) HTTP-level validation surfaced issues. ',
              'This is **non-blocking** — the testnet variant is the gating signal — but you should know:',
              '',
              summary,
              '',
              '### Likely causes',
              '- An edge/CDN/WAF rule is overriding the headers the dashboard repo sets in `public/_headers`',
              '- Mainnet is running an older build than testnet',
              '- A dashboard URL changed (update `packages/constants/src/index.ts`)',
              '',
              `> Workflow run: ${runUrl}`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
