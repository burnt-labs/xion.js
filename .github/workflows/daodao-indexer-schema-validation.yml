name: DaoDAO Indexer Schema Validation

on:
  pull_request:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      daodao_indexer_url:
        description: 'DaoDAO Indexer URL to validate against'
        required: false
        type: string
        default: 'https://daodaoindexer.burnt.com'

jobs:
  validate-schema:
    name: Validate Generated Types Against Live DaoDAO Indexer Schema
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine DaoDAO Indexer URL
        id: config
        run: |
          if [ -n "${{ github.event.inputs.daodao_indexer_url }}" ]; then
            DAODAO_INDEXER_URL="${{ github.event.inputs.daodao_indexer_url }}"
          else
            DAODAO_INDEXER_URL="https://daodaoindexer.burnt.com"
          fi
          echo "daodao_indexer_url=$DAODAO_INDEXER_URL" >> $GITHUB_OUTPUT

      - name: Backup Current Generated Types
        run: cp -r packages/signers/src/types/generated /tmp/generated-backup

      - name: Generate Types from Live DaoDAO Indexer
        run: pnpm --filter @burnt-labs/signers exec tsx ../../scripts/generate-daodao-indexer-types.ts "${{ steps.config.outputs.daodao_indexer_url }}"

      - name: Compare Generated Types
        id: compare
        run: |
          SCHEMA_CHANGED=false
          > /tmp/daodao-indexer-diff.txt

          for ts_file in packages/signers/src/types/generated/daodao-indexer-api*; do
            if [ -f "$ts_file" ]; then
              backup_file="/tmp/generated-backup/$(basename "$ts_file")"
              if [ ! -f "$backup_file" ]; then
                echo "New file detected: $(basename "$ts_file")"
                SCHEMA_CHANGED=true
                {
                  echo "=== NEW FILE: $(basename "$ts_file") ==="
                  head -30 "$ts_file"
                  echo "... (truncated)"
                } >> /tmp/daodao-indexer-diff.txt
              elif ! diff "$ts_file" "$backup_file" > /tmp/temp-diff.txt 2>&1; then
                echo "Changes detected in: $(basename "$ts_file")"
                SCHEMA_CHANGED=true
                {
                  echo "=== CHANGES IN: $(basename "$ts_file") ==="
                  cat /tmp/temp-diff.txt
                } >> /tmp/daodao-indexer-diff.txt
              fi
            fi
          done

          echo "schema_changed=$SCHEMA_CHANGED" >> $GITHUB_OUTPUT

          if [ "$SCHEMA_CHANGED" = true ]; then
            echo "Schema drift detected"
            head -50 /tmp/daodao-indexer-diff.txt
          else
            echo "Generated types match committed types"
          fi

      - name: Upload diff artifact
        if: steps.compare.outputs.schema_changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: daodao-indexer-schema-diff
          path: /tmp/daodao-indexer-diff.txt

      - name: Post schema drift comment on PR
        if: github.event_name == 'pull_request' && steps.compare.outputs.schema_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = '## DaoDAO Indexer Schema Drift\n\n' +
              '**Generated types don\'t match the live schema.**\n\n' +
              '**Action:** Run `pnpm generate:daodao-indexer-types` in `packages/signers`, review changes, and commit.\n\n' +
              '<details>\n' +
              '<summary>Details</summary>\n\n' +
              '**DaoDAO Indexer URL:** `${{ steps.config.outputs.daodao_indexer_url }}`\n\n' +
              '**Possible causes:**\n' +
              '- New formula or aggregator added to the indexer\n' +
              '- Existing formula renamed or removed\n' +
              '- Query parameter changes on a formula\n\n' +
              '*Diff available in workflow artifacts.*\n' +
              '</details>';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail on schema drift
        if: steps.compare.outputs.schema_changed == 'true'
        run: |
          echo "Schema drift detected - please regenerate types"
          exit 1
